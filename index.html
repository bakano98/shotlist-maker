<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shot List 🌸</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  :root{
    --pink:#ff7aa8; --pink-soft:#ffd6e6; --pink-bg:#fff5f9; --butter:#fff3c4;
    --bs-body-bg:transparent; --bs-body-color:#5a3a4a;
  }
  body{
    background:linear-gradient(160deg,var(--pink-bg),#fdeaf4); 
    min-height:100vh;
    display: flex;
    flex-direction: column;
  }
  footer {
    margin-top: auto;
  }
  .btn-primary{--bs-btn-bg:var(--pink);--bs-btn-border-color:var(--pink);--bs-btn-hover-bg:#ff5c93;--bs-btn-hover-border-color:#ff5c93;--bs-btn-active-bg:#ff5c93;}
  .btn-outline-primary{--bs-btn-color:var(--pink);--bs-btn-border-color:var(--pink);--bs-btn-hover-bg:var(--pink);--bs-btn-hover-border-color:var(--pink);}
  .text-brand{color:var(--pink)!important;}
  .stage{position:sticky;top:0;z-index:5;background:linear-gradient(160deg,var(--pink-bg),#fdeaf4);padding-top:6px;}
  video{width:100%;max-height:38vh;border-radius:18px;background:#000;display:block;}

  .timeline{position:relative;height:74px;border-radius:14px;background:var(--pink-soft);
    cursor:ew-resize;overflow:hidden;touch-action:none;user-select:none;}
  /* section bars sit at the bottom, below the markers, with a gap between */
  .timeline .band{position:absolute;bottom:0;height:20px;background:#fff;box-sizing:border-box;
    border-right:1px solid rgba(120,60,90,.3);z-index:2;cursor:pointer;
    overflow:hidden;white-space:nowrap;text-overflow:ellipsis;line-height:20px;
    font-size:10px;font-weight:700;color:#2f5a40;padding:0 5px;}
  .timeline .band.alt{background:#c7eed6;}
  .timeline .band.empty{color:rgba(47,90,64,.45);font-weight:500;}
  .timeline .blabel{position:absolute;bottom:0;height:20px;box-sizing:border-box;background:#fff;
    border:none;outline:2px solid var(--pink);border-radius:3px;font-size:10px;font-weight:700;color:#2f5a40;padding:0 5px;z-index:4;}
  .timeline .bhandle{position:absolute;bottom:0;height:20px;width:11px;transform:translateX(-5.5px);cursor:ew-resize;z-index:3;}
  .timeline .bhandle:hover{background:rgba(255,122,168,.6);}
  .timeline .played{position:absolute;left:0;top:0;bottom:0;background:#ffeaf2;}
  .timeline .playhead{position:absolute;top:-2px;bottom:-2px;width:3px;background:var(--pink);
    box-shadow:0 0 0 1px #fff;pointer-events:none;z-index:3;}
  .timeline .playhead::after{content:"";position:absolute;top:-1px;left:-5px;border:6px solid transparent;border-top-color:var(--pink);}
  .timeline .tick{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,122,168,.4);pointer-events:none;z-index:1;}
  .timeline .tick span{position:absolute;bottom:22px;left:3px;font-size:9px;line-height:1;color:rgba(120,60,90,.6);white-space:nowrap;}
  .marker{position:absolute;top:24px;transform:translate(-50%,-50%);width:26px;height:26px;border-radius:50%;
    background:var(--pink);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;
    border:2px solid #fff;box-shadow:0 2px 5px rgba(0,0,0,.25);cursor:grab;touch-action:none;z-index:4;}
  .marker.sel{background:#ff3d7f;outline:3px solid var(--butter);}

  .tablewrap{max-height:76vh;overflow:auto;border-radius:16px;border:2px solid var(--pink-soft);background:#fff;}
  .addrow{position:sticky;left:0;bottom:0;width:100%;border:none;border-top:2px solid #fff;background:var(--pink);color:#fff;
    padding:10px;font-weight:700;z-index:2;box-shadow:0 -3px 8px rgba(255,122,168,.25);}
  .addrow:hover{background:#ff5c93;}
  thead th{position:sticky;top:0;background:var(--pink-soft)!important;z-index:1;}
  tr.shot-sel td{background:var(--butter)!important;}
  td .form-control{border-color:transparent;background:transparent;}
  td .form-control:focus{border-color:var(--pink);background:#fff;box-shadow:none;}
  td textarea{resize:none;overflow:hidden;min-height:32px;white-space:pre-wrap;word-break:break-word;}
  td .form-select{border:2px solid var(--pink);background-color:#fff;font-weight:600;color:#a02a5a;}
  td .form-select:focus{box-shadow:0 0 0 .2rem var(--pink-soft);}
  td.num{font-weight:700;color:var(--pink);text-align:center;cursor:pointer;}
  td img{width:160px!important;height:90px!important;min-width:160px;max-width:none;object-fit:cover;border-radius:8px;background:#000;cursor:pointer;}
  tr .del{opacity:0;}
  tr:hover .del{opacity:1;}

  /* ponytail: Bootstrap grid already stacks; these only patch touch + small-screen gaps */
  @media (hover:none){ tr .del{opacity:1;} }
  @media (max-width:767px){
    .container-fluid{padding-left:8px;padding-right:8px;}
    .col-12.col-md-5{padding-left:8px!important;} .col-12.col-md-7{padding-right:8px!important;}
    video{max-height:30vh;}
    td img{width:96px!important;height:54px!important;min-width:96px;}
    th[style*="172px"]{width:108px!important;}
    .tablewrap{max-height:none;overflow-x:auto;overflow-y:visible;-webkit-overflow-scrolling:touch;}
    /* force the table wider than the wrap so every column keeps its natural width and the wrap (not the page) scrolls */
    .tablewrap table{min-width:900px;}
    th:nth-child(5),td:nth-child(5){min-width:110px;}   /* camera movement */
    th:nth-child(6),td:nth-child(6){min-width:120px;}   /* focus */
    th:nth-child(7),td:nth-child(7){min-width:150px;}   /* shot type (fits "gimbal freestyle") */
    th:nth-child(8),td:nth-child(8){min-width:160px;}   /* remarks */
    tr .del{opacity:1;}
  }
</style>
</head>
<body>
<div class="container-fluid py-3">
  <h1 class="h4 text-brand mb-3">🌸 Shot List Maker</h1>

  <div id="drop" class="border border-3 border-dashed rounded-4 bg-white text-center p-5 mx-auto"
       style="max-width:520px;border-style:dashed!important;border-color:var(--pink)!important;cursor:pointer;">
    <p class="fs-5 mb-1">Drop your <b>.mp4</b> here or click to choose</p>
    <p class="mb-0 text-brand">your clip stays on your computer 💕</p>
    <input id="file" type="file" accept="video/mp4,video/*" hidden>
  </div>

  <div id="app" class="d-none">
    <div class="row g-3">
      <div class="col-12 col-md-5" style="padding-left:30px;">
        <div class="stage">
          <video id="vid" controls playsinline webkit-playsinline></video>

          <div class="d-flex align-items-center gap-2 my-2 flex-nowrap">
            <button id="zoomOut" class="btn btn-sm btn-outline-primary">🔍−</button>
            <button id="zoomIn" class="btn btn-sm btn-outline-primary">🔍＋</button>
            <small class="text-brand text-truncate">zoom <span id="zoomLbl">1.0×</span><span class="d-none d-sm-inline"> · wheel to zoom · drag to scrub</span></small>
            <button id="swap" class="btn btn-sm btn-link text-brand ms-auto text-nowrap">↺<span class="d-none d-sm-inline"> Change video</span></button>
          </div>

          <div id="timeline" class="timeline">
            <div class="played"></div>
            <div class="playhead"></div>
          </div>

          <div class="d-flex align-items-center gap-2 mt-3 mb-3 flex-nowrap">
            <button id="addHere" class="btn btn-sm btn-primary text-nowrap" title="Add shot at playhead">＋ Add shot <small class="opacity-75">(M)</small></button>
            <button id="addSec" class="btn btn-sm btn-outline-success text-nowrap" title="Add section (split here)">＋ Split</button>
            <button id="delSec" class="btn btn-sm btn-outline-success text-nowrap" title="Remove section here">🗑 Remove</button>
          </div>
          <div class="d-flex align-items-center gap-2 mb-3 flex-nowrap">
            <button id="prevSec" class="btn btn-sm btn-success text-nowrap" title="Jump to previous section">⟸ Prev section</button>
            <button id="nextSec" class="btn btn-sm btn-success text-nowrap" title="Jump to next section">Next section ⟹</button>
          </div>
        </div>
      </div>

      <div class="col-12 col-md-7" style="padding-right:30px;">
        <div class="tablewrap">
          <table class="table table-sm align-middle mb-0">
            <thead><tr>
              <th style="width:34px;">#</th>
              <th style="width:92px;">Time</th>
              <th style="width:62px;">Length</th>
              <th style="width:172px;">Thumbnail</th>
              <th>Camera movement</th>
              <th>Focus</th>
              <th style="width:160px;">Shot type</th>
              <th>Remarks</th>
              <th style="width:38px;"></th>
            </tr></thead>
            <tbody id="rows"></tbody>
          </table>
          <button id="add" class="addrow">＋ Add shot at end (+5s)</button>
        </div>
        <div class="d-flex gap-2 mt-3 flex-nowrap">
          <button id="exportPdf" class="btn btn-sm btn-primary text-nowrap">⬇ Export PDF</button>
          <button id="export" class="btn btn-sm btn-primary text-nowrap">⬇ Export CSV</button>
          <button id="import" class="btn btn-sm btn-primary text-nowrap">⬆ Import CSV</button>
        </div>
        <input id="importFile" type="file" accept=".csv,text/csv" hidden>
      </div>
    </div>
  </div>
</div>

<footer class="text-center text-brand small py-4 opacity-75">Designed by Sanxithe and Bakano for the Odottemita Community 🌻</footer>

<video id="thumbvid" muted playsinline preload="auto" style="position:fixed;left:-9999px;top:0;width:160px;height:90px;opacity:0;pointer-events:none;"></video>

<script src="app.js?v=14"></script>
</body>
</html>
